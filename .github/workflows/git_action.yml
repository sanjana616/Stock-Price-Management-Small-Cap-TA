name: Small Cap Technical Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 3-10 * * 1-5"   # Every 5 min during NSE market hours (UTC 3:45–10:00, Mon–Fri)

concurrency:
  group: smallcap-ta-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git fetch origin main
            git pull origin main --strategy-option ours
            git push origin main
          else
            echo "No changes to commit"
          fi
